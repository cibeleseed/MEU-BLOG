<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Tech</title>
    <style>
        /* ===== CONFIGURAÇÕES GERAIS ===== */
        body{
            background-color: #EAF2F8;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
        }
        /* ===== CABEÇALHO ===== */
        header{
            background-color: #183C63;
            color: #FFFFFF;
            text-align: center;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
        }
        /* ===== IMAGEM ===== */
        img{
            width: 80px;
            height: 80px;
        }
        /* ===== CONTEÚDO PRINCIPAL ===== */
        main{
            background-color: #FFFFFF;
            color: #183C63;
            text-align: center;
            max-width: 800px;
            margin: 20px auto;
            padding: 20px;
            border-radius: 12px;
        }
        /* ===== TÍTULOS ===== */
        h1{
            margin-bottom: 10px;
        }
        h2{
            color: #0F2D4A;
        }
        /* ===== PARÁGRAFOS ===== */
        p{
            font-size:18px;
            line-height:1.6;
        }
    </style>
</head>
<body>
    <header>
        <img
            src="IMAGEM.png"
            alt="Logotipo de um blog de tecnologia e educação com cores em azul e branco, representando inovação digital"
        <h1> Meu Blog Tech</h1>
        <p>
            Vou compartilhar conhecimentos sobre
            tecnologia, programação e inovação.
        </p>
    </header>
    <main>
        <h2>🚀 Meu Primeiro Post</h2>
        <p><strong>Por: Seu Nome</strong></p>
        <p>
            Boas-vindas ao meu novo blog!
            Aqui vou compartilhar dicas de programação,
            curiosidades sobre tecnologia e tudo o que estou aprendendo.
        </p>
    </main>
</body>
</html>
